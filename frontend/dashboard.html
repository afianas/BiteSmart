<!DOCTYPE html>
<html>
<head>
    <title>BiteSmart | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🍽 Upload Your Meal</h1>

    <input type="file" id="imageInput" accept="image/*">
    <button id="analyzeBtn" type="button">Analyze</button>

    <img id="preview" />
    <div class="result" id="result"></div>

    <button type="button" onclick="logout()">Logout</button>
</div>

<script>
function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
}

const analyzeBtn = document.getElementById("analyzeBtn");
const imageInput = document.getElementById("imageInput");
const resultDiv = document.getElementById("result");
const previewImg = document.getElementById("preview");

analyzeBtn.addEventListener("click", async () => {
    if (!imageInput.files.length) {
        alert("Please select an image");
        return;
    }

    const token = localStorage.getItem("token");
    if (!token) {
        alert("You are not logged in");
        window.location.href = "login.html";
        return;
    }

    const file = imageInput.files[0];
    const formData = new FormData();
    formData.append("file", file);

    previewImg.src = URL.createObjectURL(file);
    resultDiv.innerText = "⏳ Analyzing...";

    try {
        const res = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`
            },
            body: formData
        });

        if (!res.ok) {
            throw new Error("Prediction failed");
        }

         const data = await res.json();

if (data.status === "uncertain") {
    resultDiv.innerHTML = `
        <p>⚠️ ${data.message}</p>
        <p><strong>Top predictions:</strong></p>
        <ul>
            ${data.top_5.map(item =>
                `<li>${item.label} (${(item.confidence * 100).toFixed(1)}%)</li>`
            ).join("")}
        </ul>
    `;
    return;
}

// ✅ confident prediction
resultDiv.innerHTML = `
    <p><strong>Food:</strong> ${data.food}</p>
    <p><strong>Calories:</strong> ${data.calories} kcal</p>
    <p><strong>Confidence:</strong> ${(data.confidence * 100).toFixed(1)}%</p>
`;

    
    } catch (err) {
        console.error(err);
        resultDiv.innerText = "❌ Backend error";
    }
});
</script>

</body>
</html>
